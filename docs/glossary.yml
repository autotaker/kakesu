version: 1
title: Kakesu用語集
scope:
  sources:
  - '**/*.md'
  extraction: リポジトリ内の日本語を含むMarkdown本文からASCII英単語を抽出する。正式用語を優先し、コードブロック、インラインコード、URL、ファイル名にだけ現れる未知語は識別子として分類する。
  style: 用語集の正式名称を本文の標準表記とし、識別子は必ずバッククォートで囲む。
  language: japanese
  excludes:
  - .agents/**
  - .build/**
  - .pytest_cache/**
  - node_modules/**
  - '**/.venv/**'
  - '**/target/**'
categories:
  japanese_translation:
    label: 日本語の訳語を使う
    description: 一般技術語は日本語で表記し、必要な場合だけ初出で英語を補記する。
    terms:
    - formal_name: message
      japanese: メッセージ
      abbreviations: []
      variants:
      - msg
      description: Plane間で配送する意味単位。
      lint:
        enabled: true
        mode: replace
        replacement: メッセージ
        patterns:
        - message
