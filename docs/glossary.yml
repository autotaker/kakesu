  identifier:
    label: 識別子としてバッククォートで囲む
    description: Schema名、フィールド名、状態値、イベント名、Tool名、ファイル名、コマンド名はコード識別子として表記する。
    terms:
    - formal_name: snake_case field
      japanese: スネークケースのフィールド名
      abbreviations: []
      variants:
      - task_id
      - workspace_id
      - message_id
      - correlation_id
      - causation_message_id
      - async_id
      description: Schemaのフィールド名。例はすべてバッククォートで囲む。
      lint:
        enabled: true
        mode: identifier
        replacement: null
        patterns:
        - task_id
        - workspace_id
        - message_id
        - correlation_id
        - causation_message_id
        - async_id
    - formal_name: status value
      japanese: 状態値
      abbreviations: []
      variants:
      - ready
      - running
      - waiting
      - suspended
      - completed
      - cancelled
      - failed
      - reviewing_completion
      description: Task、Job、Grantなどの状態を表す値。
      lint:
        enabled: true
        mode: identifier
        replacement: null
        patterns:
        - ready
        - running
        - waiting
        - suspended
        - completed
        - cancelled
        - failed
        - reviewing_completion
    - formal_name: event type
      japanese: イベント種別
      abbreviations: []
      variants:
      - TaskStarted
      - TaskCompleted
      - AsyncCompleted
      - EgressBlocked
      - PolicyGrantReady
      description: Eventの型名。本文ではバッククォートで囲む。
      lint:
        enabled: true
        mode: identifier
        replacement: null
        patterns:
        - TaskStarted
        - TaskCompleted
        - AsyncCompleted
        - EgressBlocked
        - PolicyGrantReady
    - formal_name: tool name
      japanese: Tool名
      abbreviations: []
      variants:
      - delegate
      - ask_parent
      - escalate
      - request_grant
      - await_async
      - update_progress
      - cancel_child_task
      description: Work Agentが呼び出すToolの名前。
      lint:
        enabled: true
        mode: identifier
        replacement: null
        patterns:
        - delegate
        - ask_parent
        - escalate
        - request_grant
        - await_async
        - update_progress
        - cancel_child_task
    - formal_name: schema identifier
      japanese: Schema識別子
      abbreviations: []
      variants:
      - message-envelope.schema.json
      - task-episode.schema.json
      - task_id
      - contract_version
      description: JSON Schema、参照名、版を示す識別子。
      lint:
        enabled: true
        mode: identifier
        replacement: null
        patterns:
        - message-envelope.schema.json
        - task-episode.schema.json
        - task_id
        - contract_version
    - formal_name: command name
      japanese: コマンド名
      abbreviations: []
      variants:
      - kakesu
      - git
      - curl
      - gh
      - make
      description: CLIで実行するコマンド。本文ではバッククォートで囲む。
      lint:
        enabled: true
        mode: identifier
        replacement: null
        patterns:
        - kakesu
        - git
        - curl
        - gh
        - make
    - formal_name: transport term
      japanese: 配送識別子
      abbreviations:
      - ACK
      variants:
      - message_id
      - idempotency_key
      - correlation_id
      - causation_message_id
      - ACK
      description: 配送の重複排除、因果関係、確定境界を表す識別子。
      lint:
        enabled: true
        mode: identifier
        replacement: null
        patterns:
        - message_id
        - idempotency_key
        - correlation_id
        - causation_message_id
        - ACK
    - formal_name: URI reference
      japanese: URI参照
      abbreviations:
      - URI
      variants:
      - artifact://...
      - evidence://...
      description: DB recordを指す論理参照。ファイルパスと混同しない。
      lint:
        enabled: true
        mode: identifier
        replacement: null
        patterns:
        - artifact://...
        - evidence://...
    - formal_name: versioned filename
      japanese: 版付きファイル名
      abbreviations: []
      variants:
      - 00-kakesu.md
      - 13-technology-stack.md
      - governance.db
      - control.db
      - evidence.db
      description: 文書、Schema、またはDBのファイル名。
      lint:
        enabled: true
        mode: identifier
        replacement: null
        patterns:
        - 00-kakesu.md
        - 13-technology-stack.md
        - governance.db
        - control.db
        - evidence.db
normalization:
- preferred: Task / Agent / Workspace / Owner / Plane
