version: 1
title: Kakesu用語集
scope:
  sources:
  - '**/*.md'
  extraction: リポジトリ内の日本語を含むMarkdown本文からASCII英単語を抽出する。正式用語を優先し、コードブロック、インラインコード、URL、ファイル名にだけ現れる未知語は識別子として分類する。
  style: 用語集の正式名称を本文の標準表記とし、識別子は必ずバッククォートで囲む。
  language: japanese
  excludes:
  - .agents/**
  - .build/**
  - .pytest_cache/**
  - node_modules/**
  - '**/.venv/**'
  - '**/target/**'
categories:
  japanese_translation:
    label: 日本語の訳語を使う
    description: 一般技術語は日本語で表記し、必要な場合だけ初出で英語を補記する。
    terms:
    - formal_name: message
      japanese: メッセージ
      abbreviations: []
      variants:
      - msg
      description: Plane間で配送する意味単位。
      lint:
        enabled: true
        mode: replace
        replacement: メッセージ
        patterns:
        - message
    - formal_name: process
      japanese: プロセス
      abbreviations: []
      variants: []
      description: OSが管理する実行単位。
      lint:
        enabled: true
        mode: replace
        replacement: プロセス
        patterns:
        - process
    - formal_name: service
      japanese: サービス
      abbreviations: []
      variants:
      - svc
      description: 独立した機能提供単位。
      lint:
        enabled: true
        mode: replace
        replacement: サービス
        patterns:
        - service
    - formal_name: component
      japanese: コンポーネント
      abbreviations: []
      variants: []
      description: 内部の責務を持つ実装単位。
      lint:
        enabled: true
        mode: replace
        replacement: コンポーネント
        patterns:
        - component
    - formal_name: request
      japanese: リクエスト
      abbreviations: []
      variants: []
      description: 処理や権限を要求するメッセージ。
      lint:
        enabled: true
        mode: replace
        replacement: リクエスト
        patterns:
        - request
    - formal_name: response
      japanese: レスポンス
      abbreviations: []
      variants: []
      description: リクエストに対する応答。
      lint:
        enabled: true
        mode: replace
        replacement: レスポンス
        patterns:
        - response
    - formal_name: event
      japanese: イベント
      abbreviations: []
      variants: []
      description: 発生した事実を表す記録。
      lint:
        enabled: true
        mode: replace
        replacement: イベント
        patterns:
        - event
    - formal_name: database
