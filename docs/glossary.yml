style_principles:
- 概念を説明する普通名詞は、ドメイン用語という理由だけで英語にせず、自然な日本語を使う。
- 日本語の技術会話で定着した外来語はカタカナ表記にする。
- 英語表記を維持するのは、製品名、言語名、規格名、略語、コード識別子、およびSchemaと同じ対象を指す最小限の正式ドメイン名に限定する。
- 複合語は単語ごとの直訳を連結せず、概念全体として自然な訳語を定義する。
project_terms:
- term: Kakesu
  description: 長期記憶を次の行動へ活かす、ローカル動作の自律AIハーネス。
  definition: 00-kakesu.md#1-目的
- term: Harness
  description: 状態、排他、再開、Workspace、配送、監査を管理するKakesuの実行基盤。
  definition: 00-kakesu.md#3-全体アーキテクチャ
- term: Agent
  description: 能力プロファイルを持ち、Taskのオーナーになれる継続的な論理主体。
  definition: 01-domain-model.md#1-agent
- term: Task
  description: 単一オーナーが目的と受け入れ条件に対して責任を持つ作業単位。
  definition: 01-domain-model.md#2-task
- term: Workspace
  description: Task専用の隔離された論理作業領域であり、セキュリティポリシーの適用単位。
  definition: 01-domain-model.md#3-workspace
- term: Owner
  description: あるTaskの遂行と完了案の提出に責任を持つAgent。
  definition: 01-domain-model.md#オーナー排他
- term: Agent Run
  description: あるAgentがあるTaskを処理する一回の実行セッション。
  definition: 01-domain-model.md#4-agent実行
- term: Task Contract
  description: Taskの目的、受け入れ条件、指示、優先順位などを固定する契約。
  definition: 01-domain-model.md#2-task
- term: Objective
  description: Taskが達成すべき目的。実行中の都合だけでは変更しない。
  definition: 01-domain-model.md#taskの成立条件
- term: Acceptance
  description: Taskを完了として受理できるかを判断する受け入れ条件。
  definition: 01-domain-model.md#taskの成立条件
- term: Outcome
  description: Taskの終端時に確定する結果。完了時は受理済みレビューを必要とする。
  definition: 01-domain-model.md#結果制約
- term: Intake
  description: 人間や外部システムからルートTaskの申請を受け付ける境界。
  definition: 02-task-lifecycle.md#2-ルート-task生成
- term: Task Proposal
  description: 親子関係、目的、受け入れ条件、予算を含むTask作成申請。
  definition: 02-task-lifecycle.md#3-子-task生成
- term: Task Progress
  description: オーナーが申告するTask内の現在地と未完了項目。
  definition: 01-domain-model.md#task進捗
- term: Ledger
  description: Task進捗をTODO形式で保持する永続台帳。
  definition: 02-task-lifecycle.md#5-task進捗
- term: SubAgent
  display: SubAgent
  description: 親Taskから委譲された子Taskを所有するAgent。
  definition: 00-kakesu.md#subagent
- term: Ask
  description: 判断責任を移さず、子Taskのオーナーが親へ助言を求める通信。
  definition: 02-task-lifecycle.md#質問
- term: Escalation
  description: 現在のTask契約では決められない判断責任を上位へ移す通信。
  definition: 02-task-lifecycle.md#上位判断依頼
- term: Completion Candidate
  description: オーナーがTaskの完了条件を満たしたとして提出する完了案。
  definition: 02-task-lifecycle.md#7-完了候補と受け入れ条件-レビュー
- term: Completion Review
  description: 完了案を現行の受け入れ条件と照合する独立レビュー。
  definition: 01-domain-model.md#5-完了レビュー
- term: Acceptance Reviewer
  description: 完了案だけを評価し、Taskを実装または修正しない短命なレビュアーAgent。
  definition: 04-built-in-agents.md#3-受け入れ条件レビュアー-agent
- term: Task Episode
  description: 終端したTaskから作る、時系列の長期記憶単位。
  definition: 08-long-term-memory.md#3-taskエピソード
- term: Plane
  description: 独立した責務、状態所有権、通信境界を持つ論理コンポーネント群。
  definition: 00-kakesu.md#31-実装境界とplane間配送
- term: Control Plane
  description: Task、再開、メールボックス、人間との通信境界を管理するPlane。
  definition: 00-kakesu.md#24-人間との通信境界をcontrol-planeへ一元化
- term: Work Agent Plane
  description: 目的理解、計画、実装、調査、委譲、完了案提出を担うPlane。
  definition: 00-kakesu.md#2-基本原則
- term: Execution Plane
  description: Workspace内のコマンドやツール実行を担うPlane。
  definition: 13-technology-stack.md#1-選定結果
- term: Governance Plane
  description: 外向き通信、認証情報、許可、監査、ポリシーを強制するPlane。
  definition: 07-governance.md#1-信頼境界
- term: Memory Plane
  description: 証跡からTaskエピソードと意味記憶を構築するPlane。
  definition: 08-long-term-memory.md#1-目的
- term: Mailbox
  description: Task宛ての非同期結果や統治イベントを順序付きで保持する受信箱。
  definition: 06-tools-and-async.md#13-メールボックスイベント
- term: Outbox
  description: Plane内の状態変更と同じトランザクションで保存する送信待ちメッセージのキュー。
  definition: 13-technology-stack.md#5-plane間通信
- term: Inbox
  description: 受信メッセージを重複排除して永続化する受信キュー。
  definition: 13-technology-stack.md#5-plane間通信
- term: Async Operation
  description: 同期期限を超えて継続し、後から結果を返す操作の永続記録。
  definition: 11-data-model.md#async_operations
- term: Continuation
  description: Taskを後から安全に再開するために固定する待機理由と再開情報。
  definition: 11-data-model.md#continuations
- term: Egress Challenge
  display: 外向き通信の許可確認
  description: 外向き通信がルールで拒否されたことと、許可申請の対象を固定する記録。
  definition: 07-governance.md#6-外向き通信-試行と許可確認
- term: Policy Grant
  description: 特定のWorkspace、Task、通信内容、期限へ束縛した一時許可。
  definition: 07-governance.md#11-一時許可
- term: Policy Binding
  description: Workspaceへ適用するポリシーとバージョンの割り当て。
  definition: 07-governance.md#11-実装永続化境界
- term: Human Authority
  description: 人間の判断が必要なときに、認証済み回答を返す責任者。
  definition: 07-governance.md#13-責任者
- term: Authority Gateway
  description: 人間の責任者への依頼と回答を一元管理するControl Planeの境界。
  definition: 00-kakesu.md#24-人間との通信境界をcontrol-planeへ一元化
- term: Policy Agent
  description: 外向き通信の許可判断と恒久ルール改定案を作る独立Agent。
  definition: 07-governance.md#10-ポリシーagent
- term: Egress Audit Agent
  description: 通過後の外向き通信を調査し、見逃しや異常を検出するAgent。
  definition: 07-governance.md#16-監査事後検知ポリシー改善
- term: Incident
  description: 安全性または統治上の異常に対して封じ込めと復旧を要する事象。
  definition: 02-task-lifecycle.md#インシデントによるtask-tree-suspension
- term: Containment
  description: インシデントの影響を起点Task、その祖先、子孫へ限定して停止する処置。
  definition: 02-task-lifecycle.md#インシデントによるtask-tree-suspension
- term: Evidence
  description: 再開、完了判定、監査、長期記憶を裏付ける不変または検証可能な証跡。
  definition: 08-long-term-memory.md#4-証跡-レイヤー
