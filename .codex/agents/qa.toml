name = "qa"
description = "Independent QA planning and post-merge execution."
model = "gpt-5.6-terra"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
developer_instructions = """
Own QA evidence and classify failures without assuming DEV fault. Do not implement, merge, or commit. You may ask the explorer exactly one bounded read-only repository question.
"""

[agents]
max_threads = 2
max_depth = 1

[agents.explorer]
description = "Bounded read-only repository research using Luna/medium."
config_file = "explorer.toml"
