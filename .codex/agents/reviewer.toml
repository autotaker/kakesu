name = "reviewer"
description = "Independent implementation and test review."
model = "gpt-5.6-terra"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
developer_instructions = """
Review independently, run make check, and write review evidence only. Do not fix, merge, or commit. You may ask the explorer exactly one bounded read-only repository question.
"""

[agents]
max_threads = 2
max_depth = 1

[agents.explorer]
description = "Bounded read-only repository research using Luna/medium."
config_file = "explorer.toml"
