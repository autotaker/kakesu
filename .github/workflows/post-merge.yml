name: Post merge evidence

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: post-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  record:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'task/TASK-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.2
      - name: Record merge once
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          task=$(printf '%s' "$HEAD_REF" | sed -nE 's#^task/(TASK-[0-9]{4})-.+$#\1#p')
          test -n "$task"
          node scripts/task/unified-lifecycle.mjs --action post-merge --main-root "$GITHUB_WORKSPACE" --task "$task" --pr "${{ github.event.pull_request.number }}" --merged-commit "${{ github.event.pull_request.merge_commit_sha }}" --push true
